services:
  opensearch:
    image: opensearchproject/opensearch:3.6.0
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - DISABLE_INSTALL_DEMO_CONFIG=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    # HNSW vector graphs live OUTSIDE the JVM heap (~13.7 KB/vector at 3072 dims):
    # the container needs heap + graph memory, hence 2g with a 512m heap
    mem_limit: 2g
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9200/_cluster/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30

  api:
    build: ./backend
    environment:
      - CODEDOC_OPENSEARCH_URL=http://opensearch:9200
      - CODEDOC_OPENAI_API_KEY=${CODEDOC_OPENAI_API_KEY:?set CODEDOC_OPENAI_API_KEY in your shell}
    ports:
      - "8000:8000"
    depends_on:
      opensearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8000/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  frontend:
    build:
      context: ./frontend
      args:
        # the BROWSER calls the API, so this is the host-published URL,
        # not the docker-internal service name
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy

  dashboards:
    image: opensearchproject/opensearch-dashboards:3.6.0
    profiles: ["debug"]
    environment:
      - OPENSEARCH_HOSTS=["http://opensearch:9200"]
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
    ports:
      - "5601:5601"
    depends_on:
      opensearch:
        condition: service_healthy

volumes:
  opensearch-data:
