name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend-quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8
        with:
          version: "0.11.20"
      - run: uv sync --locked
      - run: uv run ruff check src tests
      - run: uv run ruff format --check src tests
      - run: uv run mypy
      - run: uv run pytest tests/unit -v

  backend-integration:
    runs-on: ubuntu-latest
    services:
      opensearch:
        image: opensearchproject/opensearch:3.6.0
        env:
          discovery.type: single-node
          DISABLE_SECURITY_PLUGIN: "true"
          DISABLE_INSTALL_DEMO_CONFIG: "true"
          OPENSEARCH_JAVA_OPTS: -Xms512m -Xmx512m
        ports:
          - 9200:9200
        options: >-
          --health-cmd "curl -fs http://localhost:9200/_cluster/health || exit 1"
          --health-interval 5s --health-timeout 3s --health-retries 30
    defaults:
      run:
        working-directory: backend
    env:
      CODEDOC_OPENSEARCH_URL: http://localhost:9200
      CODEDOC_OPENAI_API_KEY: dummy-not-used-by-integration-tests
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8
        with:
          version: "0.11.20"
      - run: uv sync --locked
      - run: uv run pytest -m integration -v

  frontend-quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx eslint .
      - run: npx tsc --noEmit
      - run: npm run test

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: docker compose build

# Evals are deliberately NOT a CI gate: they call the OpenAI API (cost) and are
# non-deterministic. Run `make eval` manually; commit the report to evals/reports/.
